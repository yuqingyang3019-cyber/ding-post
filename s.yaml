edition: 3.0.0
name: ding-post
access: default

vars:
  region: cn-hangzhou

resources:
  priceBot:
    component: fc3
    props:
      region: ${vars.region}
      functionName: wastewater-price-bot
      description: DingTalk wastewater chemical price morning report bot
      runtime: custom.debian11
      code: .
      handler: not-used
      memorySize: 512
      timeout: 30
      instanceConcurrency: 20
      provisionConfig:
        defaultTarget: 1
        alwaysAllocateCPU: true
      customRuntimeConfig:
        command:
          - bash
        args:
          - agent/bootstrap.sh
        port: 9000
      environmentVariables:
        PORT: "9000"
        BOT_TITLE: ${env(BOT_TITLE, "污水处理药剂价格早报")}
        DINGTALK_CLIENT_ID: ${env(DINGTALK_CLIENT_ID)}
        DINGTALK_CLIENT_SECRET: ${env(DINGTALK_CLIENT_SECRET)}
      triggers:
        - triggerName: http-health
          triggerType: http
          description: Health check and instance warm-up endpoint
          qualifier: LATEST
          triggerConfig:
            authType: anonymous
            methods:
              - GET
